]\n2d:T8e2,\u003cp\u003e个人简介\u003c/p\u003e\n\u003cp\u003e你好，我是义务教育漏网之鱼\u003c/p\u003e\n\u003cp\u003eBUPT信息安全专业本科生，研究方向为\u003cstrong\u003e人工智能安全、全同态加密、语音安全\u003c/strong\u003e。\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e🔬 研究与计算方向\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e跨模态越狱\u003c/strong\u003e：攻击者利用多模态大模型在处理不同模态数据时的\u003cstrong\u003e安全漏洞与对齐不一致性\u003c/strong\u003e，通过精心设计的交叉模态输入，\u003cstrong\u003e绕过模型的内置安全护栏\u003c/strong\u003e，诱导模型生成违规、不安全或有害的输出。\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e视觉对抗性攻击\u003c/strong\u003e：对齐过程中，模型把图像和文本映射到同一个隐空间。攻击者只要在图像上加一点点人眼看不见的扰动，就能让模型输出完全错误的对齐结果，这在自动驾驶、内容审核场景下是致命的。\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e多模态后门与偏见\u003c/strong\u003e：如果训练数据里图文匹配存在系统性偏差（比如“护士”总配女性图片），对齐后的模型会放大这种社会偏见。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e💻 软件工程能力\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePyTorch\u003c/strong\u003e：\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDataset/Dataloader 重构\u003c/strong\u003e：多模态数据（图文对/音视频）往往体积巨大，你必须熟练掌握\u003cstrong\u003e内存映射（Memory Mapping）\u003c/strong\u003e 和\u003cstrong\u003e自定义Sampler\u003c/strong\u003e，确保GPU从不空闲等待数据加载。\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e分布式调试\u003c/strong\u003e：能看懂\u003ccode\u003etorch.distributed\u003c/code\u003e报错，知道怎么在DDP（分布式数据并行）下保存checkpoint。\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e自动化攻击框架搭建\u003c/strong\u003e：能编写\u003cstrong\u003e并发请求脚本\u003c/strong\u003e（Async/Await），同时向API或本地模型发送数千个变异的对抗样本，并自动解析返回的JSON，过滤出“有害内容”。\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e向量数据库与检索工程\u003c/strong\u003e：熟练使用 \u003cstrong\u003eFAISS\u003c/strong\u003e 或 \u003cstrong\u003eMilvus\u003c/strong\u003e，能快速在大规模向量库中做相似性搜索（用于检测训练数据泄露或后门触发）。\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCUDA 基础\u003c/strong\u003e：能读懂简单的\u003ccode\u003e.cu\u003c/code\u003e文件，会使用\u003ccode\u003envprof\u003c/code\u003e分析显存瓶颈。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e欢迎各位朋友联系交流~\u003c/strong\u003e\u003c/p\u003e2b:[\"$\",\"$21\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"h-96 flex items-center justify-center text-slate-500 font-bold animate-pulse\",\"children\":\"正在载入档案...\"}],\"children\":[\"$\",\"$L2c\",null,{\"contentHtml\":\"$2d\",\"coverImage\":\"https://bu.dusays.com/2026/03/24/69c23dc278c78.jpg\",\"activities\":[{\"id\":\"posts-存储器概述.md\",\"type\":\"文章\",\"title\":\"存储器概述\",\"date\":\"2026-07-13T06:00:00.000Z\",\"url\":\"/posts/存储器概述\"},{\"id\":\"posts-hello-world.md\",\"type\":\"文章\",\"title\":\"Hello World — 博客搭建记录\",\"date\":\"2026-07-13T02:00:00.000Z\",\"url\":\"/posts/hello-world\"}]}]}]\n"])</script><script>self.__next_f.push([1,"25:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"2e:I[27201,[\"/_next/static/chunks/0ph0hub54gnw..js\",\"/_next/static/chunks/02_50dy5bwdsx.js\",\"/_next/static/chunks/00-csyj9a6t-x.js\"],\"IconMark\"]\n22:null\n27:[[\"$\",\"title\",\"0\",{\"children\":\"义务教育漏网之鱼\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"BUPT网络安全本科生。记录编程学习、项目经验和思考。\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%236366f1'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif'%3EM%3C/text%3E%3C/svg%3E\"}],[\"$\",\"link\",\"3\",{\"rel\":\"apple-touch-icon\",\"href\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%236366f1'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif'%3EM%3C/text%3E%3C/svg%3E\"}],[\"$\",\"$L2e\",\"4\",{}]]\n"])</script></body></html>
